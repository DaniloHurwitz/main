<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Química Orgánica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #231f35;
    --accent: #e8a838;
    --accent2: #c96e6e;
    --green: #6ecb8a;
    --red: #e06c6c;
    --text: #ede9f6;
    --muted: #8b87a8;
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG decoration ── */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,168,56,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(110,203,138,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1.5rem; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── HOME ── */
  #home { gap: 2.5rem; }

  .home-badge {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,168,56,0.1);
    border: 1px solid rgba(232,168,56,0.25);
    padding: 0.4rem 1rem;
    border-radius: 100px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    line-height: 1.1;
    text-align: center;
    letter-spacing: -0.02em;
  }
  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    color: var(--muted);
    text-align: center;
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 480px;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.75rem;
    width: 100%;
    max-width: 680px;
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.3rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .topic-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .topic-card:hover::before { opacity: 1; }

  .topic-icon { font-size: 1.6rem; margin-bottom: 0.5rem; }
  .topic-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
  .topic-count { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
  .topic-done {
    position: absolute;
    top: 0.6rem; right: 0.7rem;
    font-size: 0.68rem;
    background: rgba(110,203,138,0.15);
    color: var(--green);
    border: 1px solid rgba(110,203,138,0.3);
    padding: 0.15rem 0.5rem;
    border-radius: 100px;
  }

  /* ── QUIZ SCREEN ── */
  #quiz {
    justify-content: flex-start;
    padding-top: 1.5rem;
    padding-bottom: 3rem;
    gap: 0;
  }

  .quiz-header {
    width: 100%; max-width: 680px;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 38px; height: 38px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }

  .quiz-meta { flex: 1; }
  .quiz-topic-name { font-size: 0.8rem; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .quiz-progress-text { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

  .progress-bar {
    width: 100%; max-width: 680px;
    height: 4px;
    background: var(--surface2);
    border-radius: 100px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f0c060);
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .question-card {
    width: 100%; max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 2rem;
    margin-bottom: 1.25rem;
  }

  .q-number { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }

  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }

  .options { display: flex; flex-direction: column; gap: 0.6rem; }

  .opt {
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    font-size: 0.92rem;
    line-height: 1.4;
    text-align: left;
    color: var(--text);
    transition: all 0.15s ease;
    position: relative;
  }
  .opt:hover:not([disabled]) { border-color: var(--accent); background: rgba(232,168,56,0.07); }
  .opt.correct { border-color: var(--green); background: rgba(110,203,138,0.1); color: var(--green); }
  .opt.wrong   { border-color: var(--red);   background: rgba(224,108,108,0.1); color: var(--red); }
  .opt.reveal  { border-color: var(--green); background: rgba(110,203,138,0.07); color: var(--green); opacity: 0.7; }
  .opt[disabled] { cursor: default; }

  .explanation {
    width: 100%; max-width: 680px;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 1rem 1.2rem;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 1.25rem;
    animation: fadeIn 0.3s ease;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  .encouragement {
    width: 100%; max-width: 680px;
    text-align: center;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--accent);
    padding: 0.5rem 0;
    min-height: 1.8rem;
    animation: fadeIn 0.4s ease;
  }

  .next-btn {
    background: var(--accent);
    color: #1a1000;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    border: none;
    border-radius: 10px;
    padding: 0.85rem 2.2rem;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    margin-top: 0.5rem;
    align-self: flex-end;
    width: 100%;
    max-width: 680px;
  }
  .next-btn:hover { background: #f0c060; transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* ── RESULT SCREEN ── */
  #result { gap: 1.8rem; text-align: center; }

  .result-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    position: relative;
  }
  .result-circle svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .result-circle .score-text { position: relative; z-index: 1; }
  .result-circle .score-label { font-size: 0.75rem; font-family: 'DM Sans', sans-serif; color: var(--muted); position: relative; z-index: 1; margin-top: -4px; }

  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1.2;
  }
  .result-title em { font-style: italic; color: var(--accent); }

  .result-msg {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 420px;
  }

  .parcial-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    max-width: 420px;
  }
  .parcial-note strong { color: var(--text); }

  .result-btns { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

  .btn-primary {
    background: var(--accent);
    color: #1a1000;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    border: none;
    border-radius: 10px;
    padding: 0.8rem 1.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #f0c060; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  .stars { font-size: 1.6rem; letter-spacing: 0.2rem; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-badge">Parcial · Química Orgánica</div>
  <h1>Practicá.<br><em>Promocioná.</em></h1>
  <p class="subtitle">20 preguntas por tema, nivel facultad. En el parcial son 10 — con 7 aprobás. Acá entrenás el doble para llegar sobrada.</p>
  <div class="topics-grid" id="topicsGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="quiz-meta">
      <div class="quiz-topic-name" id="quizTopicName"></div>
      <div class="quiz-progress-text" id="quizProgressText"></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="question-card">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
  </div>
  <div class="explanation" id="explanation"></div>
  <div class="encouragement" id="encouragement"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="stars" id="resultStars"></div>
  <div class="result-circle" id="resultCircle">
    <svg viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="62" fill="none" stroke="var(--surface2)" stroke-width="8"/>
      <circle cx="70" cy="70" r="62" fill="none" id="resultArc"
        stroke="var(--accent)" stroke-width="8"
        stroke-linecap="round"
        stroke-dasharray="389.6" stroke-dashoffset="389.6"/>
    </svg>
    <div class="score-text" id="resultScore"></div>
    <div class="score-label">de 20</div>
  </div>
  <div class="result-title" id="resultTitle"></div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="parcial-note" id="parcialNote"></div>
  <div class="result-btns">
    <button class="btn-primary" onclick="retryTopic()">Reintentar tema</button>
    <button class="btn-secondary" onclick="goHome()">Elegir otro tema</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const topics = [
  {
    id: "atomica",
    name: "Teoría Atómica",
    icon: "⚛️",
    questions: [
      { q: "¿Cuál es la carga del electrón?", opts: ["Positiva", "Negativa", "Neutra", "Variable según el elemento"], ans: 1, exp: "El electrón tiene carga negativa. El protón tiene carga positiva y el neutrón es neutro." },
      { q: "El número atómico de un elemento indica:", opts: ["La masa del átomo", "La cantidad de neutrones", "La cantidad de protones", "La cantidad de electrones en el último nivel"], ans: 2, exp: "El número atómico (Z) es igual a la cantidad de protones en el núcleo. En un átomo neutro, también equivale al número de electrones." },
      { q: "¿Qué modelo atómico introdujo los orbitales en lugar de órbitas definidas?", opts: ["Modelo de Dalton", "Modelo de Bohr", "Modelo mecano-cuántico", "Modelo de Thomson"], ans: 2, exp: "El modelo mecano-cuántico (Schrödinger) reemplazó las órbitas circulares de Bohr por orbitales: regiones de probabilidad de encontrar al electrón." },
      { q: "El número másico (A) de un elemento es:", opts: ["Protones + Electrones", "Protones + Neutrones", "Solo los neutrones", "Electrones + Neutrones"], ans: 1, exp: "A = Z + N. Es la suma de protones y neutrones. Los electrones tienen masa despreciable." },
      { q: "¿Cuántos electrones caben en el nivel n=2?", opts: ["2", "6", "8", "18"], ans: 2, exp: "Cada nivel n puede albergar hasta 2n² electrones. Para n=2: 2×4 = 8 electrones." },
      { q: "Dos átomos son isótopos si tienen:", opts: ["Mismo número de neutrones, distinto de protones", "Mismo número de protones, distinto de neutrones", "Mismo número másico", "Misma cantidad de electrones y neutrones"], ans: 1, exp: "Los isótopos son átomos del mismo elemento (mismos protones, Z igual) pero con diferente número de neutrones y por lo tanto distinto A." },
      { q: "La configuración electrónica del carbono (Z=6) es:", opts: ["1s² 2s² 2p⁶", "1s² 2s² 2p²", "1s² 2s¹ 2p³", "1s² 2p⁴"], ans: 1, exp: "C tiene 6 electrones: 1s² 2s² 2p². Los dos últimos se ubican en el subnivel 2p." },
      { q: "¿En qué subnivel se ubican los electrones de valencia del nitrógeno (Z=7)?", opts: ["1s", "2s", "2p", "3s"], ans: 2, exp: "Los electrones de valencia de N son los de n=2: dos en 2s y tres en 2p. El último electrón entra en 2p." },
      { q: "Según la regla de Hund, los electrones en un subnivel:", opts: ["Se aparean primero antes de ocupar orbitales vacíos", "Ocupan orbitales distintos con espines paralelos antes de aparearse", "Se ubican siempre en el orbital de menor energía", "Comparten orbital con espines antiparalelos desde el principio"], ans: 1, exp: "La regla de Hund establece que los electrones ocupan orbitales vacíos del mismo subnivel con espines paralelos antes de aparearse." },
      { q: "¿Qué principio establece que dos electrones en el mismo orbital deben tener espines opuestos?", opts: ["Principio de Aufbau", "Regla de Hund", "Principio de exclusión de Pauli", "Principio de incertidumbre de Heisenberg"], ans: 2, exp: "El principio de exclusión de Pauli dice que ningún electrón puede tener los 4 números cuánticos idénticos, por lo tanto dos electrones en el mismo orbital deben diferir en el espín." },
      { q: "El subnivel 'p' puede contener como máximo:", opts: ["2 electrones", "6 electrones", "10 electrones", "14 electrones"], ans: 1, exp: "El subnivel p tiene 3 orbitales y cada orbital alberga 2 electrones → máximo 6 electrones." },
      { q: "La electronegatividad de los elementos en la tabla periódica:", opts: ["Aumenta de derecha a izquierda y de arriba a abajo", "Aumenta de izquierda a derecha y de abajo a arriba", "Aumenta de izquierda a derecha y de arriba a abajo", "No sigue ningún patrón"], ans: 1, exp: "La electronegatividad aumenta hacia el flúor (arriba a la derecha) y disminuye hacia los metales alcalinos (abajo a la izquierda)." },
      { q: "¿Cuántos orbitales tiene el subnivel 'd'?", opts: ["3", "5", "7", "10"], ans: 1, exp: "El subnivel d tiene 5 orbitales, lo que le permite contener hasta 10 electrones." },
      { q: "El radio atómico en un período (fila) de la tabla periódica:", opts: ["Aumenta de izquierda a derecha", "Disminuye de izquierda a derecha", "Permanece constante", "Es irregular"], ans: 1, exp: "Al avanzar en un período, aumenta el número de protones sin agregar nuevos niveles, lo que genera mayor atracción sobre los electrones y reduce el radio atómico." },
      { q: "¿Cuál es el número cuántico principal del tercer nivel de energía?", opts: ["n = 1", "n = 2", "n = 3", "n = 4"], ans: 2, exp: "El número cuántico principal n indica el nivel de energía. El tercer nivel tiene n = 3." },
      { q: "¿Qué modelo introdujo la idea de que los electrones circulan en órbitas de energía fija?", opts: ["Dalton", "Rutherford", "Bohr", "Thomson"], ans: 2, exp: "Bohr (1913) propuso que los electrones orbitan el núcleo en niveles de energía fijos, sin emitir radiación mientras se mantienen en esa órbita." },
      { q: "Los metales alcalinos (grupo 1) tienen en común:", opts: ["2 electrones de valencia", "1 electrón de valencia en el subnivel s", "Capa de valencia completa", "Alta electronegatividad"], ans: 1, exp: "El grupo 1 tiene configuración ns¹, un solo electrón de valencia. Por eso son muy reactivos y forman cationes 1+." },
      { q: "Un anión se forma cuando un átomo:", opts: ["Pierde protones", "Gana electrones", "Pierde electrones", "Gana neutrones"], ans: 1, exp: "Un anión es un ion de carga negativa, formado cuando el átomo gana electrones. Ejemplo: Cl⁻." },
      { q: "La energía de ionización es la energía necesaria para:", opts: ["Unir dos átomos", "Retirar un electrón de un átomo gaseoso", "Agregar un electrón a un átomo", "Dividir el núcleo atómico"], ans: 1, exp: "La primera energía de ionización es la energía mínima para remover el electrón más externo de un átomo neutro en estado gaseoso." },
      { q: "¿Qué partícula subatómica se encuentra fuera del núcleo?", opts: ["Protón", "Neutrón", "Electrón", "Quark"], ans: 2, exp: "Los electrones orbitan alrededor del núcleo. Protones y neutrones están dentro del núcleo." },
    ]
  },
  {
    id: "carbono",
    name: "Química del Carbono",
    icon: "🔗",
    questions: [
      { q: "¿Cuántos electrones de valencia tiene el carbono?", opts: ["2", "4", "6", "8"], ans: 1, exp: "El carbono tiene Z=6, configuración 1s²2s²2p². Tiene 4 electrones de valencia, lo que le permite formar 4 enlaces covalentes." },
      { q: "La hibridación sp³ del carbono genera una geometría:", opts: ["Lineal", "Trigonal plana", "Tetraédrica", "Piramidal"], ans: 2, exp: "La hibridación sp³ combina 1 orbital s y 3 orbitales p → 4 orbitales híbridos iguales con geometría tetraédrica (~109.5°)." },
      { q: "Un carbono con hibridación sp² forma:", opts: ["4 enlaces simples", "1 doble enlace y 2 simples", "2 dobles enlaces", "1 triple enlace"], ans: 1, exp: "El carbono sp² tiene 3 orbitales híbridos (para enlaces σ) y 1 orbital p puro que participa en el doble enlace (enlace π)." },
      { q: "¿Qué tipo de hibridación tiene el carbono en un triple enlace (como en los alquinos)?", opts: ["sp³", "sp²", "sp", "sp³d"], ans: 2, exp: "En los alquinos, el carbono es sp: híbrida 1 orbital s y 1 orbital p → 2 orbitales sp lineales, dejando 2 orbitales p puros para los dos enlaces π del triple enlace." },
      { q: "La cadena carbonada más larga en una molécula se llama:", opts: ["Cadena principal", "Cadena lateral", "Radical", "Sustituyente"], ans: 0, exp: "La cadena principal es la cadena carbonada más larga de la molécula y es la base para la nomenclatura IUPAC." },
      { q: "¿Cuál de los siguientes es una propiedad característica del carbono que permite la química orgánica?", opts: ["Alta electronegatividad", "Capacidad de formar largas cadenas consigo mismo (catenación)", "Ser un metal", "Tener 6 electrones de valencia"], ans: 1, exp: "La catenación es la capacidad del carbono de formar enlaces estables con otros átomos de carbono, generando cadenas, ramas y anillos de longitud variable." },
      { q: "Un carbono primario es aquel que está unido a:", opts: ["1 carbono vecino", "2 carbonos vecinos", "3 carbonos vecinos", "4 carbonos vecinos"], ans: 0, exp: "Carbono primario: unido a 1 C. Secundario: a 2 C. Terciario: a 3 C. Cuaternario: a 4 C." },
      { q: "¿Qué tipo de enlace es más fuerte, σ (sigma) o π (pi)?", opts: ["σ, porque hay superposición frontal de orbitales", "π, porque hay superposición lateral de orbitales", "Son iguales en energía", "Depende del elemento"], ans: 0, exp: "El enlace σ es más fuerte porque la superposición frontal de orbitales es mayor. El enlace π (lateral) es más débil y más reactivo." },
      { q: "La fórmula molecular del metano es:", opts: ["C₂H₆", "CH₄", "C₂H₄", "CH₂"], ans: 1, exp: "El metano es el alcano más simple: un carbono sp³ con 4 hidrógenos. Fórmula general de alcanos: CₙH₂ₙ₊₂. Para n=1: CH₄." },
      { q: "Un grupo metilo (–CH₃) es un ejemplo de:", opts: ["Cadena principal", "Función oxigenada", "Sustituyente alquilo", "Compuesto aromático"], ans: 2, exp: "Los grupos alquilo (–CₙH₂ₙ₊₁) son sustituyentes derivados de alcanos por remoción de un H. El más simple es el metilo –CH₃." },
      { q: "El ángulo de enlace en una molécula con carbono sp³ es aproximadamente:", opts: ["120°", "180°", "109.5°", "90°"], ans: 2, exp: "La geometría tetraédrica del carbono sp³ da un ángulo de enlace de 109.5°." },
      { q: "¿Cuántos enlaces puede formar el carbono simultáneamente?", opts: ["2", "3", "4", "6"], ans: 2, exp: "El carbono tiene 4 electrones de valencia y puede formar exactamente 4 enlaces covalentes (simples, dobles o triples en combinación)." },

      { q: "¿Cuál es la fórmula molecular del benceno?", opts: ["C₆H₁₂", "C₆H₆", "C₆H₅OH", "C₆H₅CH₃"], ans: 1, exp: "El benceno es C₆H₆: 6 carbonos en anillo con un hidrógeno cada uno. Es el compuesto aromático más simple." },
      { q: "El benceno es aromático porque:", opts: ["Tiene olor agradable", "Es cíclico con 4n+2 electrones π deslocalizados (regla de Hückel)", "Tiene solo dobles enlaces", "Contiene oxígeno en el anillo"], ans: 1, exp: "La aromaticidad se define por la regla de Hückel: molécula cíclica, plana, conjugada con 4n+2 electrones π (n = entero). El benceno tiene 6 electrones π (n=1). El olor es una coincidencia histórica del nombre." },
      { q: "Los electrones π en el benceno están:", opts: ["Fijos entre pares de carbonos específicos", "Deslocalizados sobre todo el anillo", "Solo en los dobles enlaces alternos", "Ausentes, todos son simples"], ans: 1, exp: "En el benceno, los 6 electrones π forman una nube electrónica deslocalizada sobre todo el anillo. Por eso no hay dobles enlaces fijos sino un híbrido de resonancia." },
      { q: "El tolueno es el benceno con:", opts: ["Un grupo –OH", "Un grupo –CH₃ (metilo)", "Un grupo –NH₂", "Un átomo de cloro"], ans: 1, exp: "El tolueno (metilbenceno) es benceno + un grupo metilo –CH₃. Fórmula: C₇H₈. Es un disolvente común." },
      { q: "El fenol es el benceno con:", opts: ["Un grupo –CH₃", "Un grupo –COOH", "Un grupo –OH", "Un grupo –NH₂"], ans: 2, exp: "El fenol (hidroxibenceno) tiene un grupo –OH unido directamente al anillo bencénico. Es más ácido que los alcoholes comunes debido a la estabilización por resonancia del anión fenóxido." },
      { q: "¿Cómo se llama el benceno con dos grupos metilo?", opts: ["Tolueno", "Xileno (dimetilbenceno)", "Estireno", "Fenol"], ans: 1, exp: "El xileno (dimetilbenceno) tiene dos grupos metilo en el anillo. Puede ser orto (1,2), meta (1,3) o para (1,4) según la posición de los metilos." },
      { q: "En el benceno disustitiuido, la posición 'orto' (o-) significa:", opts: ["Sustituyentes en carbonos 1 y 3", "Sustituyentes en carbonos 1 y 2 (adyacentes)", "Sustituyentes en carbonos 1 y 4", "Sustituyentes en el mismo carbono"], ans: 1, exp: "Orto (o-): posiciones 1,2 (adyacentes). Meta (m-): posiciones 1,3. Para (p-): posiciones 1,4. Es la nomenclatura tradicional para bencenos disustituidos." },
      { q: "¿Cuál es el nombre del C₆H₅–COOH?", opts: ["Ácido bencenoico", "Ácido benzoico", "Fenol", "Tolueno"], ans: 1, exp: "El ácido benzoico (C₆H₅–COOH) es el ácido carboxílico del benceno. Se usa como conservante alimentario (E210)." },
      { q: "La reacción característica del benceno es la sustitución electrófila aromática (SEA) porque:", opts: ["El benceno prefiere la adición para ganar H", "El benceno prefiere la sustitución para mantener la aromaticidad del anillo", "El benceno no reacciona nunca", "El benceno solo hace reacciones de eliminación"], ans: 1, exp: "El benceno reacciona por sustitución (no adición) para conservar su sistema aromático estabilizante. La adición destruiría la aromaticidad y sería energéticamente desfavorable." },
      { q: "El estireno (vinilbenceno) tiene la estructura:", opts: ["C₆H₅–CH₃", "C₆H₅–CH=CH₂", "C₆H₅–OH", "C₆H₅–CH₂–CH₃"], ans: 1, exp: "El estireno es C₆H₅–CH=CH₂: benceno + grupo vinilo (–CH=CH₂). Es monómero del poliestireno." },
      { q: "¿Cuántos carbonos tiene el anillo del benceno?", opts: ["4", "5", "6", "8"], ans: 2, exp: "El benceno tiene 6 carbonos en su anillo hexagonal. Cada carbono tiene hibridación sp² y contribuye con 1 electrón al sistema π." },
      { q: "En la posición 'para', los sustituyentes están en:", opts: ["Carbonos 1 y 2", "Carbonos 1 y 3", "Carbonos 1 y 4 (opuestos)", "El mismo carbono"], ans: 2, exp: "Para (p-): las posiciones 1 y 4 son opuestas en el anillo hexagonal. Es la configuración más simétrica del benceno disustituido." },
      { q: "¿Cuál de estos no es un compuesto aromático?", opts: ["Benceno", "Tolueno", "Ciclohexano", "Naftaleno"], ans: 2, exp: "El ciclohexano (C₆H₁₂) es un cicloalcano saturado, NO aromático. El naftaleno es aromático (2 anillos bencénicos fusionados)." },
      { q: "El grupo fenilo (C₆H₅–) es:", opts: ["Un benceno completo", "El benceno con un H removido (usado como sustituyente)", "Un alqueno cíclico", "Un éter aromático"], ans: 1, exp: "El grupo fenilo (Ph– o C₆H₅–) es el benceno sin un hidrógeno, usado como sustituyente en nomenclatura. Ej: el cloruro de fenilo es C₆H₅–Cl." },
      { q: "El anisol es el éter metílico del fenol. Su estructura es:", opts: ["C₆H₅–OH", "C₆H₅–CH₃", "C₆H₅–O–CH₃", "C₆H₅–COOH"], ans: 2, exp: "El anisol (metoxibenceno) es C₆H₅–O–CH₃: benceno con un grupo metoxi (–OCH₃). Es el éter formado entre fenol y metanol." },
      { q: "La anilina tiene la estructura C₆H₅–NH₂. ¿Qué función química tiene?", opts: ["Alcohol aromático", "Amina aromática", "Ácido carboxílico aromático", "Aldehído aromático"], ans: 1, exp: "La anilina (aminobenceno) tiene el grupo amino –NH₂ unido al anillo bencénico. Es una amina aromática, precursora de colorantes y fármacos." },
      { q: "¿Por qué el benceno es más estable de lo esperado para un trieno cíclico?", opts: ["Por su tamaño", "Por la energía de resonancia (deslocalización de electrones π)", "Por tener solo carbonos sp³", "Por la temperatura de fusión alta"], ans: 1, exp: "El benceno es ~150 kJ/mol más estable que un ciclohexatrieno hipotético. Esta energía de resonancia (estabilización aromática) se debe a la deslocalización de los 6 electrones π sobre los 6 carbonos." },
      { q: "El o-xileno (orto-xileno) tiene los dos grupos metilo en:", opts: ["Posiciones 1 y 3", "Posiciones 1 y 4", "Posiciones 1 y 2", "Posiciones 2 y 4"], ans: 2, exp: "Orto siempre indica posiciones 1 y 2 (adyacentes). El o-xileno (1,2-dimetilbenceno) tiene los dos –CH₃ en carbonos vecinos." },
      { q: "¿Cuál es el nombre sistemático del benceno con un grupo –Cl en posición 1 y –CH₃ en posición 4?", opts: ["orto-clorotolueno", "meta-clorotolueno", "para-clorotolueno", "1-cloro-4-tolueno"], ans: 2, exp: "Posiciones 1 y 4 son PARA. Hay un cloro y un metilo → para-clorotolueno (o 4-clorotolueno en IUPAC). El tolueno es el benceno con metilo, se numera C1 en el metilo." },
      { q: "Los hidrocarburos aromáticos policíclicos (HAP) como el naftaleno se caracterizan por:", opts: ["Tener un solo anillo bencénico", "Tener dos o más anillos bencénicos fusionados", "Contener heteroátomos en el anillo", "Ser alifáticos con estructura cíclica"], ans: 1, exp: "Los HAP tienen 2 o más anillos aromáticos fusionados compartiendo lados. El naftaleno (2 anillos) y el antraceno (3 anillos) son ejemplos comunes." },
    ]
  }
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentTopic = null;
let currentQ = 0;
let score = 0;
let answered = false;
let shuffled = [];
let scores = {};

// ── ENCOURAGEMENT ─────────────────────────────────────────────────────────────
const correctPhrases = [
  "¡Exacto! Eso es química en tu cabeza.",
  "Perfecta. Vas a romperla en el parcial.",
  "¡Muy bien! Eso ya lo tenés.",
  "¡Sí! Seguí así.",
  "Correcto. La facultad no sabe lo que le viene.",
  "¡Excelente! Una más.",
  "Ese es tu nivel. No lo bajes.",
  "¡Dale! Imparable.",
  "Bien ahí. Cada respuesta es un paso al 10.",
];
const wrongPhrases = [
  "Está bien, ahora lo sabés para siempre.",
  "Esa era difícil. Ya la tenés marcada.",
  "Error de ahora, acierto en el parcial.",
  "Nadie nace sabiendo. Lo acabás de aprender.",
  "Una de más para estudiar. Vas bien.",
  "El que erró acá, no erra el miércoles.",
];

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── INIT ───────────────────────────────────────────────────────────────────────
function initHome() {
  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = '';
  topics.forEach(t => {
    const pct = scores[t.id] !== undefined ? Math.round(scores[t.id] / t.questions.length * 100) : null;
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.onclick = () => startTopic(t.id);
    card.innerHTML = `
      ${pct !== null ? `<span class="topic-done">${pct}% ✓</span>` : ''}
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-name">${t.name}</div>
      <div class="topic-count">20 preguntas</div>
    `;
    grid.appendChild(card);
  });
}

function startTopic(id) {
  currentTopic = topics.find(t => t.id === id);
  shuffled = [...currentTopic.questions].sort(() => Math.random() - 0.5);
  currentQ = 0;
  score = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[currentQ];
  answered = false;

  document.getElementById('quizTopicName').textContent = currentTopic.name;
  document.getElementById('quizProgressText').textContent = `Pregunta ${currentQ + 1} de ${shuffled.length}`;
  document.getElementById('progressFill').style.width = `${(currentQ / shuffled.length) * 100}%`;
  document.getElementById('qNumber').textContent = `Pregunta ${currentQ + 1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('encouragement').textContent = '';
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = o;
    btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = shuffled[currentQ];
  const btns = document.querySelectorAll('.opt');

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add(idx === q.ans ? 'correct' : 'reveal');
  });

  const isCorrect = idx === q.ans;
  if (isCorrect) {
    score++;
    btns[idx].classList.add('correct');
  } else {
    btns[idx].classList.add('wrong');
  }

  document.getElementById('explanation').innerHTML = `<strong>¿Por qué?</strong> ${q.exp}`;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('encouragement').textContent = isCorrect ? pickRandom(correctPhrases) : pickRandom(wrongPhrases);
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent = currentQ + 1 < shuffled.length ? 'Siguiente →' : 'Ver resultado →';
}

function nextQuestion() {
  currentQ++;
  if (currentQ < shuffled.length) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function showResult() {
  scores[currentTopic.id] = score;
  showScreen('result');

  const pct = score / shuffled.length;
  const equivOf10 = Math.round(score / 2); // 20 preguntas → equivalente a /10

  // Circle
  const circumference = 2 * Math.PI * 62;
  const arc = document.getElementById('resultArc');
  arc.style.strokeDashoffset = circumference * (1 - pct);
  arc.style.stroke = pct >= 0.7 ? 'var(--green)' : pct >= 0.5 ? 'var(--accent)' : 'var(--red)';

  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultScore').style.color = pct >= 0.7 ? 'var(--green)' : pct >= 0.5 ? 'var(--accent)' : 'var(--red)';

  let stars, title, msg;
  if (score >= 18) {
    stars = '⭐⭐⭐';
    title = '¡Maestra del tema!';
    msg = 'Esto está dominado. En el parcial, este tema lo cerrás con los ojos cerrados.';
  } else if (score >= 14) {
    stars = '⭐⭐';
    title = 'Muy sólida.';
    msg = 'El nivel está muy bien. Repasá lo que te escapó y el miércoles lo vas a clavar.';
  } else if (score >= 10) {
    stars = '⭐';
    title = 'Buen arranque.';
    msg = 'Tenés la base. Unos repasos más y este tema deja de darte vueltas.';
  } else {
    stars = '💪';
    title = 'Más práctica, más confianza.';
    msg = 'Este tema pide un poco más de atención. Es normal — para eso estás practicando ahora y no el miércoles.';
  }

  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultTitle').innerHTML = title.includes('!') ? `<em>${title}</em>` : title;
  document.getElementById('resultMsg').textContent = msg;

  const parcialEquiv = Math.round(score / 2);
  const promoText = parcialEquiv >= 7
    ? `Equivalente estimado en el parcial real (10 preguntas): <strong>${parcialEquiv}/10 — ¡Promoción! 🎉</strong>`
    : `Equivalente estimado en el parcial real (10 preguntas): <strong>${parcialEquiv}/10</strong> — el umbral de promoción es 7/10. ¡Seguí practicando!`;

  document.getElementById('parcialNote').innerHTML = promoText;
  initHome();
}

function retryTopic() { startTopic(currentTopic.id); }

function goHome() {
  initHome();
  showScreen('home');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0 });
}

// Start
initHome();
document.getElementById('home').classList.add('active');
</script>
