<style>
:root{--ink:#0d0d0d;--ink2:#3a3a3a;--ink3:#6b6b6b;--paper:#f8f6f2;--paper2:#efecea;--paper3:#e4e0db;--accent:#1a4fd6;--accent-bg:#e8eefb;--red:#d4381e;--green:#22c55e;--green-bg:#dcfce7;--green-tx:#14532d;--warn:#f59e0b;--warn-bg:#fef3c7;--warn-tx:#78350f;--red-bg:#fee2e2;--red-tx:#991b1b;--line:rgba(0,0,0,.09);--r:6px;--r-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif;font-weight:700;line-height:1.2;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none}input,textarea,select{font-family:inherit}a{color:var(--accent);text-decoration:none}
.mono{font-family:'DM Mono',monospace}
.wrap{max-width:1060px;margin:0 auto;padding:0 28px}.wrap-sm{max-width:900px;margin:0 auto;padding:0 28px}
nav{position:sticky;top:0;z-index:100;background:rgba(248,246,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;max-width:1060px;margin:0 auto;flex-wrap:wrap;gap:8px}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.03em;cursor:pointer}
.nav-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.btn{padding:10px 20px;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.85}.btn-primary{background:var(--ink);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink2)}.btn-sm{padding:6px 14px;font-size:.75rem}.btn-accent{background:var(--accent);color:#fff}
.field{display:block;margin-bottom:16px}
.field-label{display:block;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.field-input{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid var(--line);font-size:.88rem;background:#fff;outline:none}
.field-input:focus{border-color:var(--accent)}
textarea.field-input{resize:vertical;min-height:120px;line-height:1.7}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.04em}

.callout{border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:.88rem}
.callout-info{background:var(--accent-bg);border-left:3px solid var(--accent);color:#1e3a8a}
.callout-green{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green-tx)}
.callout-warn{background:var(--warn-bg);border-left:3px solid var(--warn);color:var(--warn-tx)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:8px;font-size:.85rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .35s ease both}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.ch-row{display:grid;grid-template-columns:48px 1fr 90px 130px;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid rgba(0,0,0,.05);transition:background .1s;cursor:pointer}
.ch-row:last-child{border-bottom:none}.ch-row:hover{background:#faf9f7}.ch-row.locked{opacity:.45;cursor:not-allowed}
.ch-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem}
.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab{padding:10px 16px;font-size:.82rem;color:var(--ink3);border:1px solid transparent;border-radius:var(--r) var(--r) 0 0;margin-bottom:-1px;transition:all .15s}
.tab.active{font-weight:600;color:var(--accent);background:#fff;border-color:var(--line);border-bottom-color:#fff}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);border:1px solid var(--line);font-size:.88rem;text-align:left;width:100%;transition:all .12s;margin-bottom:6px;cursor:pointer;background:#fff}

.quiz-opt.selected{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green-tx)}
.quiz-opt.wrong{border-color:#ef4444;background:var(--red-bg);color:var(--red-tx)}
.quiz-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}
.prac-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;transition:border-color .15s;cursor:pointer;margin-bottom:10px}
.prac-card:hover{border-color:var(--accent)}
.kw-tag{display:inline-block;padding:3px 9px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.72rem;margin:2px}
.kw-hit{background:var(--green-bg);color:var(--green-tx)}.kw-miss{background:var(--red-bg);color:var(--red-tx)}.kw-bad{background:var(--warn-bg);color:var(--warn-tx)}
.fb-row{display:flex;align-items:start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.84rem}
.fb-row:last-child{border-bottom:none}
.fb-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;font-weight:700}
.chat-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;font-weight:700}
@media(max-width:700px){.ch-row{grid-template-columns:40px 1fr 70px}.ch-row>:nth-child(4){display:none}}
</style>
</head>

// ═══ UTILS ═══
async function sha256(t){const d=new TextEncoder().encode(t);const b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v))}
function lp(k){return lsGet('m_lp_'+k)||{}}
function lpSave(k,d){lsSet('m_lp_'+k,{...lp(k),...d})}
function toast(m,t){S.toastMsg=m;S.toastType=t||'info';render();setTimeout(()=>{S.toastMsg=null;render();},3500);}

// ═══ DB & AUTH ═══
async function loadDb(){const r=await fetch('./db.json?t='+Date.now());if(!r.ok)throw new Error('db.json not found');S.db=await r.json();}
async function login(e){e.preventDefault();const fd=new FormData(e.target);const email=fd.get('email').trim().toLowerCase();const pw=fd.get('password');try{await loadDb();const h=await sha256(pw);const u=S.db.users.find(x=>x.email===email&&x.passwordHash===h);if(!u){toast('Email o contraseña incorrectos','error');return;}S.user=u;lsSet('m_sess',{userId:u.id});S.view='dashboard';render();}catch(err){toast('Error: '+err.message,'error');}}
function logout(){localStorage.removeItem('m_sess');S.user=null;S.view='login';S.chapterId=null;render();}
async function tryResume(){const s=lsGet('m_sess');if(s){try{await loadDb();const u=S.db.users.find(x=>x.id===s.userId);if(u){S.user=u;S.view='dashboard';}}catch{}}render();}
function isUnlocked(id){const i=CHAPTERS.findIndex(c=>c.id===id);if(i===0)return true;const p=S.db.progress[S.user.id];return p&&p[CHAPTERS[i-1].id]&&p[CHAPTERS[i-1].id].approved;}
function chSt(id){const p=S.db.progress[S.user.id];if(p&&p[id]&&p[id].approved)return'approved';if(lp(id).submitted)return'submitted';return isUnlocked(id)?'available':'locked';}
async function sendWH(chId,det){const url=S.db.meta.webhookUrl;if(!url)return;const ch=CHAPTERS.find(c=>c.id===chId);try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:'📩 **Entrega** — '+S.user.name+' ('+S.user.email+')',embeds:[{title:'Cap '+chId+': '+ch.title,description:det,color:3447003}]})});}catch{}}
async function submitCh(chId){const l=lp(chId);let d='Entregable: '+CHAPTERS.find(c=>c.id===chId).deliverable+'\n';if(l.quizScore!=null)d+='Quiz: '+l.quizScore+'/'+(Q[chId]||[]).length+'\n';lpSave(chId,{submitted:true});await sendWH(chId,d);toast('Entrega enviada. Tu mentor la revisará.','success');render();}

}

    if(st==='approved')h+='<div class="callout callout-green">✅ <strong>Aprobado.</strong> Podés avanzar al siguiente.</div>';
    else if(st==='submitted')h+='<div class="callout callout-warn">⏳ <strong>Entrega enviada</strong> — tu mentor la revisará.</div>';
    else h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:18px;background:#fff;border-radius:var(--r);border:1px solid var(--line);margin-top:16px"><div><span class="mono" style="font-size:.68rem;color:var(--ink3);text-transform:uppercase">Estado</span><p style="font-size:.88rem;font-weight:500;margin-top:3px">📖 En progreso</p></div><button onclick="submitCh(\''+ch.id+'\')" class="btn btn-primary">Enviar entrega</button></div>';
  }
  if(S.chapterTab==='quiz')h+=rQuiz(ch);
  return h+'</div></div>';
}

function rQuiz(ch){
  var quiz=Q[ch.id]||[],l=lp(ch.id),done=l.quizAnswers&&Object.keys(l.quizAnswers).length===quiz.length&&l.quizScore!=null,ans=l.quizAnswers||{};
  var h='<h3 style="font-size:1.1rem;margin-bottom:16px">Quiz — Capítulo '+ch.id+' ('+quiz.length+' preguntas)</h3>';
  quiz.forEach(function(q,qi){
    h+='<div class="fade" style="background:#fff;border-radius:var(--r);padding:18px;margin-bottom:10px;border:1px solid var(--line);animation-delay:'+qi*.04+'s"><p style="font-weight:500;margin-bottom:10px">'+(qi+1)+'. '+q.q+'</p>';
    q.o.forEach(function(opt,oi){
      var sel=ans[qi]===oi,cls='quiz-opt';
      if(done&&oi===q.c)cls+=' correct';else if(done&&sel&&oi!==q.c)cls+=' wrong';else if(!done&&sel)cls+=' selected';
      var ds=done&&oi===q.c?'background:var(--green);border-color:var(--green);color:#fff':done&&sel&&oi!==q.c?'background:#ef4444;border-color:#ef4444;color:#fff':!done&&sel?'background:var(--accent);border-color:var(--accent);color:#fff':'';
      var dt=done&&oi===q.c?'✓':done&&sel&&oi!==q.c?'✗':!done&&sel?'✓':'';
      h+='<button class="'+cls+'" '+(done?'disabled':'')+' onclick="qAns('+qi+','+oi+')"><span class="quiz-dot" style="'+ds+'">'+dt+'</span>'+opt+'</button>';
    });h+='</div>';
  });
  if(!done){var ok=Object.keys(ans).length===quiz.length;h+='<button onclick="qSub(\''+ch.id+'\')" class="btn btn-primary" style="margin-top:8px;'+(ok?'':'opacity:.4;pointer-events:none')+'">Enviar respuestas</button>';}
  else{var sc=l.quizScore,p=sc===quiz.length;h+='<div class="callout '+(p?'callout-green':'callout-warn')+'" style="margin-top:8px"><strong>'+sc+'/'+quiz.length+' correctas'+(p?' — ¡Perfecto!':'')+'</strong><br><span style="font-size:.84rem">'+(p?'Dominio total.':'Revisá las incorrectas.')+'</span></div>';}
  return h;
}

  });return h;

function rChatSim(sc){
  var saved=lp('chat_'+sc.id);

  return h;

function rJobAn(){
  var h='<h3 style="margin-bottom:6px">Analizador de Job Postings</h3><p style="color:var(--ink3);font-size:.88rem;margin-bottom:20px">Identificá green flags y red flags en publicaciones reales.</p>';
  JOB_AN.forEach(function(jp,i){
    var saved=lp('ja_'+i),rev=saved.revealed;
    h+='<div class="fade" style="background:#fff;border-radius:var(--r);padding:20px;margin-bottom:14px;border:1px solid var(--line);animation-delay:'+i*.06+'s"><h4 style="font-size:.95rem;margin-bottom:8px">'+jp.title+'</h4><p style="font-size:.86rem;color:var(--ink2);line-height:1.6;margin-bottom:14px">'+jp.desc+'</p>';
    if(!rev){h+='<button onclick="lpSave(\'ja_'+i+'\',{revealed:true});render()" class="btn btn-primary btn-sm">Revelar análisis</button>';}
    else{h+='<div style="border-top:1px solid var(--line);padding-top:12px">';jp.flags.forEach(function(f){var c=f.y==='green'?'var(--green-tx)':f.y==='red'?'var(--red-tx)':'var(--warn-tx)';var bg=f.y==='green'?'var(--green-bg)':f.y==='red'?'var(--red-bg)':'var(--warn-bg)';var ic=f.y==='green'?'✅':f.y==='red'?'🚩':'⚠️';h+='<div class="fb-row"><div class="fb-icon" style="background:'+bg+';color:'+c+';font-size:.65rem">'+ic+'</div><span>'+f.t+'</span></div>';});h+='</div>';}
    h+='</div>';
  });return h;
}

function rMsgEval(){
  var h='<h3 style="margin-bottom:6px">Evaluador de Mensajes</h3><p style="color:var(--ink3);font-size:.88rem;margin-bottom:20px">Elegí la mejor respuesta. Feedback detallado sobre tu elección.</p>';
  MSG_SC.forEach(function(sc,si){
    var saved=lp('msg_'+si),rev=saved.selected!=null;
    h+='<div class="fade" style="background:#fff;border-radius:var(--r-lg);padding:20px;margin-bottom:16px;border:1px solid var(--line);animation-delay:'+si*.06+'s"><h4 style="font-size:.95rem;margin-bottom:6px">'+sc.title+'</h4><p style="font-size:.85rem;color:var(--ink3);margin-bottom:14px;padding:10px;background:var(--paper2);border-radius:var(--r);font-style:italic">'+sc.ctx+'</p>';
    sc.rs.forEach(function(r,ri){
      var isSel=saved.selected===ri,stars=r.sc;
      var bg='#fff',border='1px solid var(--line)';
      if(rev&&isSel){border='2px solid '+(stars>=3?'var(--green)':stars>=2?'var(--warn)':'var(--red)');bg=stars>=3?'var(--green-bg)':stars>=2?'var(--warn-bg)':'var(--red-bg)';}
      h+='<button style="text-align:left;padding:14px;border-radius:var(--r);background:'+bg+';border:'+border+';margin-bottom:6px;width:100%;cursor:'+(rev?'default':'pointer')+'" '+(rev?'disabled':'')+' onclick="lpSave(\'msg_'+si+'\',{selected:'+ri+'});render()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-family:\'Syne\',sans-serif;font-weight:600;font-size:.86rem">'+r.label+'</span>'+(rev?'<span class="mono" style="font-size:.72rem">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</span>':'')+'</div><p style="font-size:.84rem;color:var(--ink2);line-height:1.55">'+r.text+'</p>'+(rev&&isSel?'<div style="margin-top:10px;padding:10px;background:rgba(0,0,0,.03);border-radius:var(--r);font-size:.82rem;color:var(--ink2);font-style:italic">💡 '+r.fb+'</div>':'')+'</button>';
    });h+='</div>';
  });return h;
}

function rRes(){
  var h='<div class="wrap-sm" style="padding-top:36px;padding-bottom:80px"><button onclick="S.view=\'dashboard\';render()" class="fade" style="display:flex;align-items:center;gap:5px;color:var(--ink3);font-size:.85rem;margin-bottom:20px;padding:0;background:none;border:none">← Volver</button><div class="fade" style="margin-bottom:32px"><span class="mono" style="font-size:.7rem;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase">Biblioteca</span><h1 style="font-size:1.6rem;margin-top:6px">Recursos y herramientas</h1></div>';

    cat.items.forEach(function(item){h+='<a href="'+item.u+'" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:var(--r);border:1px solid var(--line);margin-bottom:4px;color:inherit"><div><p style="font-weight:500;font-size:.88rem">'+item.n+'</p><p style="font-size:.78rem;color:var(--ink3);margin-top:1px">'+item.d+'</p></div><span style="color:var(--ink3)">↗</span></a>';});
    h+='</div>';
  });return h+'</div>';

// ═══ HANDLERS ═══
window.qAns=function(qi,oi){var l=lp(S.chapterId);var a=l.quizAnswers||{};a[qi]=oi;lpSave(S.chapterId,{quizAnswers:a});render();};
window.qSub=function(chId){var quiz=Q[chId]||[],l=lp(chId),a=l.quizAnswers||{},s=0;quiz.forEach(function(q,i){if(a[i]===q.c)s++;});lpSave(chId,{quizScore:s});render();};

window.analyzeProp=function(scId){
  var ta=document.getElementById('propText');if(!ta||ta.value.length<50){toast('Mínimo 50 caracteres','error');return;}
  var sc=PROP_SC.find(function(s){return s.id===scId;});var text=ta.value,lower=text.toLowerCase();
  lpSave('prop_'+scId,{text:text});
  var fk=sc.kw.filter(function(k){return lower.indexOf(k)>-1;}),fb=sc.bad.filter(function(p){return lower.indexOf(p)>-1;});
  var wc=text.trim().split(/\s+/).filter(Boolean).length;
  var score=Math.min(10,Math.round((fk.length/sc.kw.length)*5+Math.max(0,3-fb.length)+(wc>=80&&wc<=300?2:wc>=50?1:0)));
  var sBg=score>=8?'var(--green-bg)':score>=5?'var(--warn-bg)':'var(--red-bg)',sTx=score>=8?'var(--green-tx)':score>=5?'var(--warn-tx)':'var(--red-tx)';
  document.getElementById('propResult').innerHTML='<div class="fade" style="margin-top:20px;background:#fff;border-radius:var(--r);padding:20px;border:1px solid var(--line)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:44px;height:44px;border-radius:50%;background:'+sBg+';display:flex;align-items:center;justify-content:center;font-family:\'Syne\',sans-serif;font-weight:800;font-size:1.1rem;color:'+sTx+'">'+score+'</div><div><p style="font-family:\'Syne\',sans-serif;font-weight:700">'+score+'/10</p><p style="font-size:.82rem;color:var(--ink3)">'+(score>=8?'Propuesta fuerte':score>=5?'Aceptable':'Necesita trabajo')+'</p></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><span class="mono" style="font-size:.68rem;color:var(--green-tx)">Keywords ('+fk.length+'/'+sc.kw.length+')</span><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">'+sc.kw.map(function(k){return'<span class="kw-tag '+(fk.indexOf(k)>-1?'kw-hit':'kw-miss')+'">'+k+'</span>';}).join('')+'</div></div><div><span class="mono" style="font-size:.68rem;color:'+(fb.length?'var(--red-tx)':'var(--green-tx)')+'">Frases débiles ('+fb.length+')</span><div style="margin-top:6px">'+(fb.length===0?'<p style="font-size:.82rem;color:var(--green-tx)">✓ Ninguna</p>':fb.map(function(p){return'<span class="kw-tag kw-bad">⚠ "'+p+'"</span>';}).join(''))+'</div></div></div></div>';
};

window.analyzeChat=function(scId){
  var ta=document.getElementById('chatInput');if(!ta||ta.value.length<20){toast('Mínimo 20 caracteres','error');return;}
  var sc=CHAT_SC.find(function(s){return s.id===scId;});var text=ta.value,lower=text.toLowerCase();
  lpSave('chat_'+scId,{text:text});
  var hits=sc.must.filter(function(k){return lower.indexOf(k)>-1;}),miss=sc.must.filter(function(k){return lower.indexOf(k)===-1;});
  var bonus=sc.should.filter(function(k){return lower.indexOf(k)>-1;}),errs=sc.avoid.filter(function(k){return lower.indexOf(k)>-1;});
  var score=Math.max(0,Math.min(10,Math.round((hits.length/sc.must.length)*6+(bonus.length/sc.should.length)*4-errs.length*2)));
  var sBg=score>=7?'var(--green-bg)':score>=4?'var(--warn-bg)':'var(--red-bg)',sTx=score>=7?'var(--green-tx)':score>=4?'var(--warn-tx)':'var(--red-tx)';
  var fb='';
  hits.forEach(function(k){fb+='<div class="fb-row"><div class="fb-icon" style="background:var(--green-bg);color:var(--green-tx)">✓</div><span><strong>Acierto:</strong> mencionaste "'+k+'"</span></div>';});
  miss.forEach(function(k){fb+='<div class="fb-row"><div class="fb-icon" style="background:var(--red-bg);color:var(--red-tx)">✗</div><span><strong>Falta:</strong> no mencionaste "'+k+'" — importante acá</span></div>';});
  bonus.forEach(function(k){fb+='<div class="fb-row"><div class="fb-icon" style="background:var(--accent-bg);color:var(--accent)">+</div><span><strong>Bonus:</strong> incluiste "'+k+'"</span></div>';});
  errs.forEach(function(k){fb+='<div class="fb-row"><div class="fb-icon" style="background:var(--warn-bg);color:var(--warn-tx)">⚠</div><span><strong>Error:</strong> usaste "'+k+'" — debilita tu posición</span></div>';});
  document.getElementById('chatResult').innerHTML='<div class="fade" style="background:#fff;border-radius:var(--r);padding:20px;border:1px solid var(--line)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:44px;height:44px;border-radius:50%;background:'+sBg+';display:flex;align-items:center;justify-content:center;font-family:\'Syne\',sans-serif;font-weight:800;font-size:1.1rem;color:'+sTx+'">'+score+'</div><div><p style="font-family:\'Syne\',sans-serif;font-weight:700">'+score+'/10</p><p style="font-size:.82rem;color:var(--ink3)">'+(score>=7?'Respuesta profesional':score>=4?'Aceptable pero mejorable':'Necesita trabajo')+'</p></div></div>'+fb+'</div>';
};

window.S=S;window.submitCh=submitCh;window.login=login;window.logout=logout;window.lpSave=lpSave;window.lp=lp;
tryResume();
</script></body></html>
