<!DOCTYPE html>
<html lang="es">
<head>

<title>Mentoría Freelance — Danilo Hurwitz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d0d;--ink2:#3a3a3a;--ink3:#6b6b6b;--paper:#f8f6f2;--paper2:#efecea;--paper3:#e4e0db;--accent:#1a4fd6;--accent-bg:#e8eefb;--red:#d4381e;--green:#22c55e;--green-bg:#dcfce7;--green-tx:#14532d;--warn:#f59e0b;--warn-bg:#fef3c7;--warn-tx:#78350f;--red-bg:#fee2e2;--red-tx:#991b1b;--line:rgba(0,0,0,.09);--r:6px;--r-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif;font-weight:700;line-height:1.2;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none}input,textarea,select{font-family:inherit}a{color:var(--accent);text-decoration:none}
.mono{font-family:'DM Mono',monospace}
.wrap{max-width:1060px;margin:0 auto;padding:0 28px}
.wrap-sm{max-width:900px;margin:0 auto;padding:0 28px}

nav{position:sticky;top:0;z-index:100;background:rgba(248,246,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;max-width:1060px;margin:0 auto;flex-wrap:wrap;gap:8px}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.03em;cursor:pointer}
.nav-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}

.btn{padding:10px 20px;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.85}.btn-primary{background:var(--ink);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink2)}.btn-sm{padding:6px 14px;font-size:.75rem}
.field{display:block;margin-bottom:16px}
.field-label{display:block;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.field-input{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid var(--line);font-size:.88rem;background:#fff;outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--accent)}
textarea.field-input{resize:vertical;min-height:120px;line-height:1.7}

.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.04em}
.badge-green{background:var(--green-bg);color:var(--green-tx)}.badge-warn{background:var(--warn-bg);color:var(--warn-tx)}.badge-grey{background:var(--paper3);color:var(--ink3)}.badge-blue{background:var(--accent-bg);color:var(--accent)}

.callout{border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:.88rem}
.callout-info{background:var(--accent-bg);border-left:3px solid var(--accent);color:#1e3a8a}
.callout-green{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green-tx)}
.callout-warn{background:var(--warn-bg);border-left:3px solid var(--warn);color:var(--warn-tx)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:8px;font-size:.85rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .35s ease both}

.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.ch-row{display:grid;grid-template-columns:48px 1fr 90px 130px;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid rgba(0,0,0,.05);transition:background .1s;cursor:pointer}
.ch-row:last-child{border-bottom:none}
.ch-row:hover{background:#faf9f7}
.ch-row.locked{opacity:.45;cursor:not-allowed}
.ch-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem}

.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--line)}
.tab{padding:10px 16px;font-size:.82rem;color:var(--ink3);border:1px solid transparent;border-radius:var(--r) var(--r) 0 0;margin-bottom:-1px;transition:all .15s}
.tab.active{font-weight:600;color:var(--accent);background:#fff;border-color:var(--line);border-bottom-color:#fff}

.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);border:1px solid var(--line);font-size:.88rem;text-align:left;width:100%;transition:all .12s;margin-bottom:6px;cursor:pointer;background:#fff}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-bg)}
.quiz-opt.selected{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green-tx)}
.quiz-opt.wrong{border-color:#ef4444;background:var(--red-bg);color:var(--red-tx)}
.quiz-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}

.chat-msg{display:flex;gap:10px;margin-bottom:14px}
.chat-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;font-weight:700}
.chat-bubble{font-size:.9rem;line-height:1.6;color:var(--ink2)}

.response-card{text-align:left;padding:16px;border-radius:8px;background:#fff;border:1px solid var(--line);cursor:pointer;transition:all .12s;margin-bottom:8px;width:100%}
.response-card:hover:not(:disabled){border-color:var(--accent)}

@media(max-width:700px){.ch-row{grid-template-columns:40px 1fr 70px}.ch-row>:nth-child(4){display:none}.nav-in{gap:6px}}
</style>
</head>

// ─── CRYPTO ───
async function sha256(t){const d=new TextEncoder().encode(t);const b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

// ─── STORAGE HELPERS ───
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v))}
function localProgress(chId){return lsGet('mentoria_lp_'+chId)||{}}
function saveLocalProgress(chId,data){lsSet('mentoria_lp_'+chId,{...localProgress(chId),...data})}

// ─── DB FETCH ───
async function loadDb(){
  // Try relative path first, then with cache buster
  const r=await fetch('./db.json?t='+Date.now());
  if(!r.ok) throw new Error('No se pudo cargar db.json');
  S.db=await r.json();
}

// ─── AUTH ───
async function login(e){
  e.preventDefault();
  const fd=new FormData(e.target);
  const email=fd.get('email').trim().toLowerCase();
  const pw=fd.get('password');
  try{
    await loadDb();
    const hash=await sha256(pw);
    const user=S.db.users.find(u=>u.email===email&&u.passwordHash===hash);
    if(!user){toast('Email o contraseña incorrectos','error');return;}
    S.user=user;
    lsSet('mentoria_session',{userId:user.id,email:user.email});
    S.view='dashboard';
    render();
  }catch(err){toast('Error al conectar: '+err.message,'error');}
}

function logout(){
  localStorage.removeItem('mentoria_session');
  S.user=null;S.view='login';S.chapterId=null;render();
}

async function tryResumeSession(){
  const sess=lsGet('mentoria_session');
  if(sess){
    try{
      await loadDb();
      const user=S.db.users.find(u=>u.id===sess.userId);
      if(user){S.user=user;S.view='dashboard';}
    }catch{}
  }
  render();
}

// ─── UNLOCK LOGIC ───
function isUnlocked(chId){
  const idx=CHAPTERS.findIndex(c=>c.id===chId);
  if(idx===0) return true;
  const prevId=CHAPTERS[idx-1].id;
  const prog=S.db.progress[S.user.id];
  return prog&&prog[prevId]&&prog[prevId].approved;
}

function chapterStatus(chId){
  const dbProg=S.db.progress[S.user.id];
  const approved=dbProg&&dbProg[chId]&&dbProg[chId].approved;
  if(approved) return 'approved';
  const lp=localProgress(chId);
  if(lp.submitted) return 'submitted';
  return isUnlocked(chId)?'available':'locked';
}

  const ch=CHAPTERS.find(c=>c.id===chId);
  try{
    await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      content:`📩 **Nueva entrega** — ${S.user.name} (${S.user.email})`,
      embeds:[{title:`Capítulo ${chId}: ${ch.title}`,description:details,color:3447003,timestamp:new Date().toISOString(),footer:{text:'Mentoría Freelance — Plataforma de alumnos'}}]
    })});
  }catch{}
}

// ─── SUBMIT CHAPTER ───
async function submitChapter(chId){
  const lp=localProgress(chId);
  let details=`Entregable: ${CHAPTERS.find(c=>c.id===chId).deliverable}\n`;
  if(lp.quizScore!=null) details+=`Quiz: ${lp.quizScore}/${(Q[chId]||[]).length}\n`;
  if(lp.proposalDone) details+=`Simulador de propuesta: completado\n`;
  if(lp.chatScore!=null) details+=`Simulación de chat: ${lp.chatScore}/3\n`;
  saveLocalProgress(chId,{submitted:true,submittedAt:new Date().toISOString()});
  await sendWebhook(chId,details);
  toast('Entrega enviada. Tu mentor la revisará pronto.','success');
  render();
}

// ─── TOAST ───
function toast(m,t){S.toastMsg=m;S.toastType=t||'info';render();setTimeout(()=>{S.toastMsg=null;render()},3500);}

// ─── RENDER ───
function render(){
  const app=document.getElementById('app');
  let h='';
  if(S.toastMsg){
    const bg=S.toastType==='error'?'var(--red-bg)':S.toastType==='success'?'var(--green-bg)':'var(--accent-bg)';
    const cl=S.toastType==='error'?'var(--red-tx)':S.toastType==='success'?'var(--green-tx)':'#1e3a8a';
    h+=`<div class="toast" style="background:${bg};color:${cl}">${S.toastMsg}</div>`;
  }
  if(S.view==='login') h+=renderLogin();
  else{
    h+=renderNav();
    if(S.view==='dashboard') h+=renderDashboard();
    if(S.view==='chapter') h+=renderChapter();
    if(S.view==='resources') h+=renderResources();
  }
  app.innerHTML=h;
}

function renderQuizTab(ch){
  const quiz=Q[ch.id]||[];
  const lp=localProgress(ch.id);
  const done=lp.quizAnswers&&Object.keys(lp.quizAnswers).length===quiz.length&&lp.quizScore!=null;
  const answers=lp.quizAnswers||{};

  let h=`<h3 style="font-size:1.1rem;margin-bottom:16px">Quiz — Capítulo ${ch.id}</h3>`;
  quiz.forEach((q,qi)=>{
    h+=`<div class="fade" style="background:#fff;border-radius:var(--r);padding:18px;margin-bottom:10px;border:1px solid var(--line);animation-delay:${qi*.06}s">
      <p style="font-weight:500;margin-bottom:10px">${qi+1}. ${q.q}</p>`;
    q.o.forEach((opt,oi)=>{
      const sel=answers[qi]===oi;
      let cls='quiz-opt';
      if(done&&oi===q.c) cls+=' correct';
      else if(done&&sel&&oi!==q.c) cls+=' wrong';
      else if(!done&&sel) cls+=' selected';
      const dotStyle=done&&oi===q.c?'background:var(--green);border-color:var(--green);color:#fff':done&&sel&&oi!==q.c?'background:#ef4444;border-color:#ef4444;color:#fff':!done&&sel?'background:var(--accent);border-color:var(--accent);color:#fff':'';
      const dotText=done&&oi===q.c?'✓':done&&sel&&oi!==q.c?'✗':!done&&sel?'✓':'';
      h+=`<button class="${cls}" ${done?'disabled':''} onclick="quizAnswer(${qi},${oi})">
        <span class="quiz-dot" style="${dotStyle}">${dotText}</span>${opt}</button>`;
    });
    h+=`</div>`;
  });

  if(!done){
    const allAnswered=Object.keys(answers).length===quiz.length;
    h+=`<button onclick="quizSubmit('${ch.id}')" class="btn btn-primary" style="margin-top:8px;${allAnswered?'':'opacity:.4;pointer-events:none'}">Enviar respuestas</button>`;
  } else {
    const sc=lp.quizScore;
    const perfect=sc===quiz.length;
    h+=`<div class="callout ${perfect?'callout-green':'callout-warn'}" style="margin-top:8px">
      <strong>${sc}/${quiz.length} correctas${perfect?' — ¡Perfecto!':''}</strong><br>
      <span style="font-size:.84rem">${perfect?'Dominio total del capítulo.':'Revisá las respuestas incorrectas arriba.'}</span>
    </div>`;
  }
  return h;
}

window.quizAnswer=function(qi,oi){
  const lp=localProgress(S.chapterId);
  const answers=lp.quizAnswers||{};
  answers[qi]=oi;
  saveLocalProgress(S.chapterId,{quizAnswers:answers});
  render();
};

window.quizSubmit=function(chId){
  const quiz=Q[chId]||[];
  const lp=localProgress(chId);
  const answers=lp.quizAnswers||{};
  let score=0;
  quiz.forEach((q,i)=>{if(answers[i]===q.c) score++;});
  saveLocalProgress(chId,{quizScore:score});
  render();
};

// Proposal
window.analyzeProposal=function(){
  const ta=document.getElementById('proposalText');
  if(!ta) return;
  const text=ta.value;
  if(text.length<50){toast('Escribí al menos 50 caracteres','error');return;}
  const lower=text.toLowerCase();
  const ex=PROPOSAL_EX;
  const foundKw=ex.keywords.filter(k=>lower.includes(k));
  const foundBad=ex.badPhrases.filter(p=>lower.includes(p));
  const wc=text.trim().split(/\s+/).filter(Boolean).length;
  const score=Math.min(10,Math.round((foundKw.length/ex.keywords.length)*5+Math.max(0,3-foundBad.length)+(wc>=80&&wc<=300?2:wc>=50?1:0)));

  saveLocalProgress(S.chapterId,{proposalText:text,proposalDone:true,proposalScore:score});

  const div=document.getElementById('proposalResult');
  const scoreBg=score>=8?'var(--green-bg)':score>=5?'var(--warn-bg)':'var(--red-bg)';
  const scoreTx=score>=8?'var(--green-tx)':score>=5?'var(--warn-tx)':'var(--red-tx)';
  div.innerHTML=`
  <div class="fade" style="margin-top:20px;background:#fff;border-radius:var(--r);padding:20px;border:1px solid var(--line)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:44px;height:44px;border-radius:50%;background:${scoreBg};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:${scoreTx}">${score}</div>
      <div>
        <p style="font-family:'Syne',sans-serif;font-weight:700">Puntaje: ${score}/10</p>
        <p style="font-size:.82rem;color:var(--ink3)">${score>=8?'Propuesta fuerte':score>=5?'Aceptable — hay espacio para mejorar':'Necesita trabajo'}</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <span class="mono" style="font-size:.68rem;color:var(--green-tx);letter-spacing:.06em;text-transform:uppercase">Keywords (${foundKw.length}/${ex.keywords.length})</span>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">
          ${ex.keywords.map(k=>`<span class="mono" style="padding:2px 7px;border-radius:3px;font-size:.72rem;background:${foundKw.includes(k)?'var(--green-bg)':'var(--red-bg)'};color:${foundKw.includes(k)?'var(--green-tx)':'var(--red-tx)'}">${k}</span>`).join('')}
        </div>
      </div>
      <div>
        <span class="mono" style="font-size:.68rem;color:${foundBad.length?'var(--red-tx)':'var(--green-tx)'};letter-spacing:.06em;text-transform:uppercase">Frases débiles (${foundBad.length})</span>
        <div style="margin-top:6px">
          ${foundBad.length===0?'<p style="font-size:.82rem;color:var(--green-tx)">✓ Ninguna detectada</p>':foundBad.map(p=>`<span class="mono" style="display:inline-block;padding:2px 7px;border-radius:3px;font-size:.72rem;background:var(--red-bg);color:var(--red-tx);margin:0 3px 3px 0">⚠ "${p}"</span>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
};

// Chat
window.chatSelect=function(chId,idx){
  const scenario=CHATS[chId];
  const score=scenario.responses[idx].score;
  saveLocalProgress(chId,{chatSelected:idx,chatScore:score});
  render();
};

window.submitChapter=submitChapter;

tryResumeSession();
</script>
