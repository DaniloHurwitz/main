<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoría Freelance — Danilo Hurwitz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d0d;--ink2:#3a3a3a;--ink3:#6b6b6b;--paper:#f8f6f2;--paper2:#efecea;--paper3:#e4e0db;--accent:#1a4fd6;--accent-bg:#e8eefb;--green:#22c55e;--green-bg:#dcfce7;--green-tx:#14532d;--warn:#f59e0b;--warn-bg:#fef3c7;--warn-tx:#78350f;--red-bg:#fee2e2;--red-tx:#991b1b;--line:rgba(0,0,0,.09);--r:6px;--r-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:16px;line-height:1.65;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif;font-weight:700;line-height:1.2;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none}input,textarea,select{font-family:inherit}a{color:var(--accent);text-decoration:none}
.mono{font-family:'DM Mono',monospace}.wrap{max-width:1060px;margin:0 auto;padding:0 28px}.wrap-sm{max-width:900px;margin:0 auto;padding:0 28px}
nav{position:sticky;top:0;z-index:100;background:rgba(248,246,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;max-width:1060px;margin:0 auto;flex-wrap:wrap;gap:8px}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;letter-spacing:-.03em;cursor:pointer}
.nav-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.btn{padding:10px 20px;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.85}.btn-primary{background:var(--ink);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink2)}.btn-sm{padding:6px 14px;font-size:.75rem}.btn-accent{background:var(--accent);color:#fff}
.field{display:block;margin-bottom:16px}
.field-label{display:block;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.field-input{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid var(--line);font-size:.88rem;background:#fff;outline:none}
.field-input:focus{border-color:var(--accent)}textarea.field-input{resize:vertical;min-height:120px;line-height:1.7}
.badge{display:inline-block;padding:3px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.04em}
.badge-green{background:var(--green-bg);color:var(--green-tx)}.badge-warn{background:var(--warn-bg);color:var(--warn-tx)}.badge-grey{background:var(--paper3);color:var(--ink3)}.badge-blue{background:var(--accent-bg);color:var(--accent)}.badge-red{background:var(--red-bg);color:var(--red-tx)}
.callout{border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:.88rem}
.callout-info{background:var(--accent-bg);border-left:3px solid var(--accent);color:#1e3a8a}
.callout-green{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green-tx)}
.callout-warn{background:var(--warn-bg);border-left:3px solid var(--warn);color:var(--warn-tx)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:8px;font-size:.85rem;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.fade{animation:fadeIn .35s ease both}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.ch-row{display:grid;grid-template-columns:48px 1fr 90px 130px;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid rgba(0,0,0,.05);transition:background .1s;cursor:pointer}
.ch-row:last-child{border-bottom:none}.ch-row:hover{background:#faf9f7}.ch-row.locked{opacity:.45;cursor:not-allowed}
.ch-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem}
.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab{padding:10px 16px;font-size:.82rem;color:var(--ink3);border:1px solid transparent;border-radius:var(--r) var(--r) 0 0;margin-bottom:-1px;transition:all .15s}
.tab.active{font-weight:600;color:var(--accent);background:#fff;border-color:var(--line);border-bottom-color:#fff}
.quiz-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);border:1px solid var(--line);font-size:.88rem;text-align:left;width:100%;transition:all .12s;margin-bottom:6px;cursor:pointer;background:#fff}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-bg)}
.quiz-opt.selected{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.quiz-opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green-tx)}
.quiz-opt.wrong{border-color:#ef4444;background:var(--red-bg);color:var(--red-tx)}
.quiz-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}
.prac-card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;transition:border-color .15s;cursor:pointer;margin-bottom:10px}
.prac-card:hover{border-color:var(--accent)}
.kw-tag{display:inline-block;padding:3px 9px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.72rem;margin:2px}
.kw-hit{background:var(--green-bg);color:var(--green-tx)}.kw-miss{background:var(--red-bg);color:var(--red-tx)}.kw-bad{background:var(--warn-bg);color:var(--warn-tx)}
.fb-row{display:flex;align-items:start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.84rem}.fb-row:last-child{border-bottom:none}
.fb-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;font-weight:700}
.chat-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;font-weight:700}
.typing-dots span{animation:blink 1.4s infinite;font-size:1.2rem;letter-spacing:3px}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
.chat-input-bar{display:flex;gap:8px;padding:12px;background:var(--paper2);border-radius:0 0 var(--r-lg) var(--r-lg);border-top:1px solid var(--line)}
.chat-input-bar input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--line);font-size:.88rem;background:#fff;outline:none}
.chat-input-bar button{padding:8px 18px;border-radius:20px;background:var(--accent);color:#fff;font-weight:600;font-size:.82rem}
@media(max-width:700px){.ch-row{grid-template-columns:40px 1fr 70px}.ch-row>:nth-child(4){display:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══ CHAPTERS & PHASES ═══
var CH=[
{id:"1.1",p:1,t:"Qué sos antes de ser freelancer",dur:"15 min",del:"Lista de habilidades ordenada por mercado",d:"Tu inventario real de habilidades, idiomas y contexto."},
{id:"1.2",p:1,t:"Elegir la plataforma correcta",dur:"12 min",del:"Decisión documentada de plataforma + argumentos",d:"Por qué Upwork y no Fiverr o salir directo."},
{id:"1.3",p:1,t:"Definir el nicho con precisión",dur:"18 min",del:"Nicho escrito en una oración",d:"No 'traducción'. Traducción médica, inglés–español, para publicaciones."},
{id:"1.4",p:1,t:"Construir el perfil que filtra clientes",dur:"20 min",del:"Borrador completo de perfil listo para revisión",d:"Foto, título, overview y tarifas. El perfil como filtro."},
{id:"1.5",p:1,t:"Tarifas de arranque",dur:"14 min",del:"Tarifa definida con justificación escrita",d:"Cómo fijar la primera tarifa sin regalarlo."},
{id:"2.1",p:2,t:"Leer un job posting como operador",dur:"16 min",del:"Lista de criterios de filtro personales",d:"Qué señales buscar antes de escribir una propuesta."},
{id:"2.2",p:2,t:"La estructura de la propuesta que funciona",dur:"20 min",del:"Template base propio (3 variantes)",d:"Primer párrafo, cuerpo, cierre. La lógica detrás de cada línea."},
{id:"2.3",p:2,t:"Cuánto cobrar y cómo presentarlo",dur:"15 min",del:"Decisión de modelo de precio por tipo de trabajo",d:"Fixed vs hourly, cómo anclar el precio."},
{id:"2.4",p:2,t:"Iterar sin quemarse",dur:"13 min",del:"Tabla de seguimiento: propuestas / respuestas / hipótesis",d:"Cómo leer las métricas, qué ajustar."},
{id:"2.5",p:2,t:"La entrevista",dur:"17 min",del:"Lista de preguntas propias para entrevista",d:"Qué preguntar, qué evaluar, cuándo decir que no."},
{id:"3.1",p:3,t:"Ejecutar el primer contrato",dur:"18 min",del:"Protocolo de comunicación propio (checklist)",d:"Comunicación, entrega, expectativas."},
{id:"3.2",p:3,t:"Conseguir la primera review",dur:"12 min",del:"Mensaje tipo para solicitar review",d:"Cómo pedirla, cómo capitalizar la buena."},
{id:"3.3",p:3,t:"Construir historial deliberadamente",dur:"15 min",del:"Plan de los próximos 3 proyectos objetivo",d:"Elegir proyectos para posicionarse mejor."},
{id:"3.4",p:3,t:"Subir tarifas sin perder clientes",dur:"14 min",del:"Decisión de nueva tarifa + mensaje de transición",d:"Cuándo subir, cómo comunicarlo."}];
var PH=[{id:1,n:"Posicionamiento",d:"Quién sos, qué ofrecés, a quién"},{id:2,n:"Sistema de propuestas",d:"Cómo escribir, cuánto cobrar, cómo iterar"},{id:3,n:"Primer contrato y más allá",d:"Conseguir el primero, construir historial, escalar"}];

// ═══ QUIZZES (5 per chapter, all Spanish) ═══
var Q={"1.1":[{q:"¿Qué debe reflejar tu inventario de habilidades?",o:["Lo que aspirás a ser","Lo que ya podés entregar bajo presión a un cliente real","Todo lo que alguna vez estudiaste","Las habilidades más populares en Upwork"],c:1},{q:"¿Cuál es el error más común al armar el inventario?",o:["Ser demasiado honesto","Incluir habilidades aspiracionales que todavía no dominás","No incluir idiomas","Poner pocas habilidades"],c:1},{q:"¿Para qué sirve cruzar tu inventario con búsquedas en la plataforma?",o:["Para copiar perfiles exitosos","Para validar demanda real y dimensionar la competencia","Para encontrar clientes directamente","Para definir tu tarifa"],c:1},{q:"¿Qué información va en 'Contexto de credibilidad'?",o:["Tu CV completo","Background que te posiciona para un nicho específico (estudios, país, industria)","Solo certificaciones oficiales","Tu experiencia laboral formal"],c:1},{q:"Si dudás de si una habilidad entra en tu inventario, ¿qué te preguntás?",o:["¿Me gusta hacerlo?","¿Puedo entregarlo a un cliente real, bajo presión, con calidad profesional?","¿Lo aprendí en la universidad?","¿Otros freelancers lo ofrecen?"],c:1}],
"1.2":[{q:"¿Por qué se recomienda Upwork sobre Fiverr para servicios profesionales?",o:["Es más barato","Permite relaciones de largo plazo y proyectos complejos","Tiene más usuarios","Es más fácil de usar"],c:1},{q:"¿Cuál es la estrategia correcta al elegir plataformas?",o:["Registrarse en todas a la vez","Enfocarse en UNA plataforma principal","Usar solo redes sociales","Esperar a tener portfolio"],c:1},{q:"¿Qué ventaja tiene Upwork sobre clientes directos al principio?",o:["Paga más","Tiene sistema de Escrow que protege el pago","Es más fácil de usar","Los clientes son mejores"],c:1},{q:"¿Cuándo tiene sentido buscar clientes fuera de la plataforma?",o:["Desde el día uno","Cuando ya tenés reputación y sistema de cobro propio","Nunca","Solo si no conseguís nada en Upwork"],c:1},{q:"¿Qué riesgo tiene Fiverr para servicios complejos?",o:["No permite esos servicios","Te posiciona como commodity con precios race-to-the-bottom","No tiene protección de pago","Los clientes son peores"],c:1}],
"1.3":[{q:"¿Qué diferencia a un nicho de una categoría amplia?",o:["El nicho es más caro","Especifica qué hacés, para quién, y con qué diferencial","Limita tus oportunidades","No hay diferencia real"],c:1},{q:"¿Por qué el especialista cobra más que el generalista?",o:["Tiene más experiencia","Resuelve un problema específico y urgente con expertise demostrable","Trabaja menos horas","Tiene mejor marketing"],c:1},{q:"¿Cuál es el resultado de micro-nicharse?",o:["Menos clientes y menos ingresos","Menos competencia, tarifas más altas, mejores clientes","Demasiada especialización es mala","No tiene impacto real"],c:1},{q:"¿Cuáles son los 3 círculos para encontrar tu nicho?",o:["Precio, Calidad, Velocidad","Habilidades, Conocimiento/Pasión, Demanda de mercado","Idiomas, Ubicación, Experiencia","Plataforma, Servicio, Cliente"],c:1},{q:"Un freelancer que dice 'hago de todo' transmite...",o:["Versatilidad profesional","Falta de expertise y desesperación","Ambición","Flexibilidad valorada por clientes"],c:1}],
"1.4":[{q:"¿Cuál es el propósito principal del perfil?",o:["Mostrar tu CV completo","Funcionar como filtro que atrae al cliente correcto y repele al incorrecto","Impresionar con logros académicos","Competir por precio"],c:1},{q:"¿Qué estructura debe seguir el resumen del perfil?",o:["Cronológico como un CV","AIDA: Atención, Interés, Deseo, Acción","Lista de habilidades","Carta de presentación formal"],c:1},{q:"¿Por qué las primeras 2 líneas del overview son críticas?",o:["Porque son las más largas","Son lo único que ve el cliente en el preview antes de hacer click","Porque van en negrita","No son más importantes que el resto"],c:1},{q:"Un título como 'Freelancer' o 'Trabajador dedicado' es malo porque...",o:["Es demasiado corto","No comunica nicho, habilidad ni diferenciador — es genérico e invisible","No es profesional","La plataforma lo penaliza"],c:1},{q:"¿Qué tipo de foto NO debés usar?",o:["Headshot profesional con buena luz","Selfie en un bar con lentes de sol","Foto reciente y nítida","Foto con fondo limpio y simple"],c:1}],
"1.5":[{q:"¿Por qué es peligroso empezar con tarifas muy bajas?",o:["Los clientes no te toman en serio","Quemás tiempo en trabajo de bajo valor sin construir reputación relevante","La plataforma te penaliza","No es peligroso, es lo recomendable"],c:1},{q:"¿Cuál es la estrategia correcta de tarifa inicial?",o:["La más alta posible","La más baja para ganar volumen","Un sweet spot que señale competencia sin ser inalcanzable","Igual a la del competidor más exitoso"],c:2},{q:"¿Qué pasó cuando Danilo subió a $45/hr prematuramente?",o:["Consiguió mejores clientes","Silencio total — no tenía la prueba social para justificar ese precio","Le fue exactamente igual","Los clientes negociaron a la baja"],c:1},{q:"¿Qué comunica tu precio a un cliente potencial?",o:["Solo cuánto cuesta contratarte","Tu nivel de competencia, confiabilidad y valor percibido","Nada importante","Tu nivel de desesperación"],c:1},{q:"La tarifa de $25/hr fue estratégica porque...",o:["Era la más baja del mercado","Señalaba competencia profesional sin ser inalcanzable para un freelancer nuevo","Era un número redondo fácil de recordar","La eligió al azar"],c:1}],
"2.1":[{q:"¿Qué es lo primero que evaluás en un job posting?",o:["El presupuesto ofrecido","Si el cliente tiene método de pago verificado e historial de contratación","La cantidad de propuestas recibidas","Si el cliente es de tu mismo país"],c:1},{q:"¿Cuándo es mejor NO aplicar a un trabajo?",o:["Cuando el presupuesto es bajo","Cuando el cliente es completamente nuevo, sin historial ni pago verificado","Cuando hay muchos otros aplicantes","Cuando es precio fijo"],c:1},{q:"¿Por qué importa aplicar rápido (primeras horas)?",o:["Porque la plataforma te da un bonus","Porque el cliente ve las primeras propuestas y frecuentemente contrata rápido","Porque después se cierra el posting","No importa la velocidad"],c:1},{q:"¿Qué filtro de presupuesto conviene para los primeros trabajos?",o:["Solo proyectos de +$500","$50-$200 fixed price para victorias rápidas y primeras reviews","Solo contratos por hora","Sin filtro de presupuesto"],c:1},{q:"Un job post con alcance vago y presupuesto 'a definir' es señal de...",o:["Un cliente flexible y abierto","Un cliente que no sabe lo que quiere — riesgo alto de problemas","Un proyecto grande y lucrativo","Una oportunidad premium"],c:1}],
"2.2":[{q:"¿Cuál es la proporción ideal de una propuesta ganadora?",o:["100% sobre vos y tus logros","50% vos, 50% el cliente","70% problema del cliente, 30% vos como solución","90% sobre el cliente"],c:2},{q:"¿Qué debe lograr el primer párrafo de tu propuesta?",o:["Presentarte formalmente con tu nombre y título","Demostrar que leíste y entendés el problema específico del cliente","Listar todas tus habilidades relevantes","Mencionar tu tarifa desde el inicio"],c:1},{q:"¿Por qué la 'propuesta masiva' (copy-paste) no funciona?",o:["Porque las plataformas la detectan automáticamente","Porque es genérica y no demuestra comprensión del problema del cliente","Porque gasta demasiados Connects","Porque es demasiado larga"],c:1},{q:"¿Qué es el UVP en una propuesta?",o:["Un formato de video profesional","Tu Propuesta de Valor Única — por qué vos y no otro freelancer","Un tipo de modelo de pricing","Una certificación de plataforma"],c:1},{q:"¿Cuál es el cierre ideal de una propuesta?",o:["'Espero su respuesta, gracias'","Un llamado a acción confiado con próximo paso concreto","'Puedo empezar inmediatamente, contratáme'","'Mi tarifa es negociable'"],c:1}],
"2.3":[{q:"¿Cómo calculás un precio fijo correctamente?",o:["Copiás lo que cobra la competencia","Horas estimadas × tarifa + buffer del 20-30%","Ponés el número más bajo posible","Le preguntás al cliente cuánto quiere pagar"],c:1},{q:"¿Qué señala una tarifa descrita como 'negociable'?",o:["Flexibilidad profesional","Falta de confianza e invitación al regateo","Experiencia en ventas","Orientación al cliente"],c:1},{q:"¿Cuándo conviene cobrar por hora vs precio fijo?",o:["Siempre por hora, es más seguro","Por hora para scope indefinido, fijo para entregables claros","Siempre precio fijo, es más profesional","Depende exclusivamente del cliente"],c:1},{q:"El buffer del 20-30% en un precio fijo cubre...",o:["Solo ganancia extra","Revisiones, comunicación con el cliente e imprevistos técnicos","La comisión de la plataforma","Los impuestos"],c:1},{q:"El 'script del Por Qué' para justificar tu tarifa debe enfocarse en...",o:["Explicar por qué sos caro comparado con otros","El valor, expertise y tranquilidad que entregás al cliente","Compararte punto por punto con la competencia","Detallar tus gastos personales y costos fijos"],c:1}],
"2.4":[{q:"¿Cada cuánto deberías revisar tus métricas de propuestas?",o:["Todos los días obsesivamente","Semanalmente, con hipótesis de mejora documentadas","Solo cuando no conseguís trabajo por un mes","Nunca, es pérdida de tiempo"],c:1},{q:"Si mandaste 15 propuestas sin respuesta, ¿cuál es el approach correcto?",o:["Bajar la tarifa dramáticamente","Analizar el patrón, ajustar UNA variable, y probar de nuevo","Cambiar de plataforma","Dejar de aplicar por un mes para 'resetear'"],c:1},{q:"¿Qué es un test A/B de propuestas?",o:["Mandar la misma propuesta a todos","Cambiar UNA variable entre propuestas y comparar resultados","Usar dos plataformas simultáneamente","Escribir en dos idiomas distintos"],c:1},{q:"¿Cuántas propuestas 'de precisión' conviene mandar por día?",o:["50+ para maximizar chances","3-5 hiper-personalizadas","Solo 1, bien pensada","Todas las que puedas, sin límite"],c:1},{q:"La 'mentalidad de datos' implica tratar cada propuesta rechazada como...",o:["Un fracaso personal","Un experimento con hipótesis medible y datos para mejorar","Una obligación cumplida","Un gasto de Connects perdido"],c:1}],
"2.5":[{q:"¿Para qué sirve la entrevista previa a un contrato?",o:["Solo para que el cliente te evalúe a vos","Para que ambas partes evalúen si hay buen fit","Para negociar el precio final","Para demostrar habilidades técnicas en vivo"],c:1},{q:"¿Cuándo es correcto decir 'no' a un proyecto?",o:["Nunca, todo trabajo es bueno al principio","Cuando las señales muestran riesgo: scope vago, sin presupuesto, mala comunicación","Solo si la tarifa es muy baja","Solo si no tenés tiempo disponible"],c:1},{q:"¿Qué pregunta inteligente podés hacer en la entrevista?",o:["'¿Cuánto paga exactamente?'","'¿Cuál es el resultado ideal de este proyecto para usted?'","'¿Hay otros candidatos compitiendo?'","'¿Puedo empezar mañana mismo?'"],c:1},{q:"¿Qué red flag buscás en el comportamiento del cliente durante la entrevista?",o:["Que haga preguntas técnicas difíciles","Que no pueda definir el alcance ni el resultado esperado","Que tenga un presupuesto limitado pero claro","Que sea de otro país o timezone"],c:1},{q:"¿Cómo te posicionás como 'socio' en vez de 'contratado'?",o:["Diciendo explícitamente 'soy el mejor del mercado'","Sugiriendo mejoras y mostrando comprensión profunda del problema del cliente","Bajando tu precio para parecer accesible","Aceptando todo lo que diga sin cuestionar"],c:1}],
"3.1":[{q:"¿Qué debés mandar dentro de las primeras 2 horas de aceptar un contrato?",o:["Un saludo casual y simpático","Un mensaje de kick-off con alcance, entregables, timeline y preguntas clarificadoras","Tu factura anticipada","Nada, esperá que el cliente te diga qué hacer"],c:1},{q:"¿Qué es el scope creep y cómo lo manejás?",o:["Ignoralo para no molestar al cliente","Referí al acuerdo original y cotizá el trabajo adicional por separado","Hacé todo gratis para mantener la relación","Rechazás el trabajo entero"],c:1},{q:"¿Para qué sirve el check-in de mitad de camino?",o:["Para pedir más plata","Para dar tranquilidad al cliente y demostrar proactividad profesional","Para renegociar condiciones","No sirve para nada, molesta al cliente"],c:1},{q:"Si anticipás un posible retraso, ¿qué hacés?",o:["Esperás a que pase el deadline y después explicás","Comunicás ANTES del plazo con explicación clara y nueva fecha propuesta","Entregás lo que tengas, incompleto","No decís nada y rezás que no se note"],c:1},{q:"El mensaje de kick-off profesional debe incluir...",o:["Solo un saludo cordial","Alcance confirmado, entregables específicos, timeline, preguntas y descripción de tu proceso","Tu CV y portfolio completo","Tu tarifa reiterada por las dudas"],c:1}],

function lp(k){return lsG('m_'+k)||{};}
function lpS(k,d){lsS('m_'+k,Object.assign({},lp(k),d));}
function toast(m,t){S.toastMsg=m;S.toastType=t||'info';render();setTimeout(function(){S.toastMsg=null;render();},3500);}

// ═══ DB & AUTH ═══
async function loadDb(){var r=await fetch('./db.json?t='+Date.now());if(!r.ok)throw new Error('db.json no encontrado');S.db=await r.json();}
async function login(e){e.preventDefault();var fd=new FormData(e.target);var email=fd.get('email').trim().toLowerCase();var pw=fd.get('password');try{await loadDb();var h=await sha256(pw);var u=S.db.users.find(function(x){return x.email===email&&x.passwordHash===h;});if(!u){toast('Email o contraseña incorrectos','error');return;}S.user=u;lsS('m_sess',{id:u.id});S.view='dashboard';render();}catch(err){toast('Error: '+err.message,'error');}}
function logout(){localStorage.removeItem('m_sess');S.user=null;S.view='login';S.chapterId=null;render();}
async function tryResume(){var s=lsG('m_sess');if(s){try{await loadDb();var u=S.db.users.find(function(x){return x.id===s.id;});if(u){S.user=u;S.view='dashboard';}}catch(e){}}render();}
function isUnlocked(id){var i=CH.findIndex(function(c){return c.id===id;});if(i===0)return true;var p=S.db.progress[S.user.id];return p&&p[CH[i-1].id]&&p[CH[i-1].id].approved;}
function chSt(id){var p=S.db.progress[S.user.id];if(p&&p[id]&&p[id].approved)return'approved';if(lp(id).submitted)return'submitted';return isUnlocked(id)?'available':'locked';}
async function sendWH(chId,det){var url=S.db.meta.webhookUrl;if(!url)return;var ch=CH.find(function(c){return c.id===chId;});try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:'\ud83d\udce9 **Entrega** \u2014 '+S.user.name+' ('+S.user.email+')',embeds:[{title:'Cap '+chId+': '+ch.t,description:det,color:3447003}]})});}catch(e){}}
async function submitCh(chId){var l=lp(chId);var d='Entregable: '+CH.find(function(c){return c.id===chId;}).del+'\n';if(l.quizScore!=null)d+='Quiz: '+l.quizScore+'/'+(Q[chId]||[]).length+'\n';lpS(chId,{submitted:true});await sendWH(chId,d);toast('Entrega enviada. Tu mentor la revisará.','success');render();}

  if(S.view==='login')h+=rLogin();
  else{h+=rNav();if(S.view==='dashboard')h+=rDash();if(S.view==='chapter')h+=rCh();if(S.view==='practice')h+=rPrac();if(S.view==='resources')h+=rRes();}
  document.getElementById('app').innerHTML=h;
  // Bind word count
  var ta=document.getElementById('propText'),wc=document.getElementById('propWC');
  if(ta&&wc){var u=function(){wc.textContent=ta.value.trim().split(/\s+/).filter(Boolean).length+' palabras';};ta.addEventListener('input',u);u();}
  // Scroll chat to bottom
  var ct=document.getElementById('chatThread');if(ct)ct.scrollTop=ct.scrollHeight;
  // Focus chat input
  var ci=document.getElementById('chatMsgInput');if(ci&&!S.chatTyping)ci.focus();
}

/span></div></div></div></div><div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px"><div class="fade" style="width:100%;max-width:380px"><h2 style="font-size:1.5rem;margin-bottom:6px">Iniciar sesi\u00f3n</h2><p style="color:var(--ink3);font-size:.9rem;margin-bottom:28px">Acced\u00e9 a tu cuenta para continuar</p><form onsubmit="login(event)"><label class="field"><span class="field-label">Email</span><input class="field-input" type="email" name="email" required placeholder="tu@email.com"></label><label class="field"><span class="field-label">Contrase\u00f1a</span><input class="field-input" type="password" name="password" required placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022"></label><button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px">Entrar</button></form></div></div></div>';}

  if(S.chapterTab==='quiz')h+=rQuiz(ch);
  return h+'</div></div>';}

function rQuiz(ch){var quiz=Q[ch.id]||[],l=lp(ch.id),done=l.quizAnswers&&Object.keys(l.quizAnswers).length===quiz.length&&l.quizScore!=null,ans=l.quizAnswers||{};

  quiz.forEach(function(q,qi){h+='<div class="fade" style="background:#fff;border-radius:var(--r);padding:18px;margin-bottom:10px;border:1px solid var(--line);animation-delay:'+qi*.04+'s"><p style="font-weight:500;margin-bottom:10px">'+(qi+1)+'. '+q.q+'</p>';
    q.o.forEach(function(opt,oi){var sel=ans[qi]===oi,cls='quiz-opt';if(done&&oi===q.c)cls+=' correct';else if(done&&sel&&oi!==q.c)cls+=' wrong';else if(!done&&sel)cls+=' selected';var ds=done&&oi===q.c?'background:var(--green);border-color:var(--green);color:#fff':done&&sel&&oi!==q.c?'background:#ef4444;border-color:#ef4444;color:#fff':!done&&sel?'background:var(--accent);border-color:var(--accent);color:#fff':'';var dt=done&&oi===q.c?'\u2713':done&&sel&&oi!==q.c?'\u2717':!done&&sel?'\u2713':'';
      h+='<button class="'+cls+'" '+(done?'disabled':'')+' onclick="qAns('+qi+','+oi+')"><span class="quiz-dot" style="'+ds+'">'+dt+'</span>'+opt+'</button>';});h+='</div>';});
  if(!done){var ok=Object.keys(ans).length===quiz.length;h+='<button onclick="qSub(\''+ch.id+'\')" class="btn btn-primary" style="margin-top:8px;'+(ok?'':'opacity:.4;pointer-events:none')+'">Enviar respuestas</button>';}
  else{var sc=l.quizScore,pf=sc===quiz.length;h+='<div class="callout '+(pf?'callout-green':'callout-warn')+'" style="margin-top:8px"><strong>'+sc+'/'+quiz.length+(pf?' \u2014 \u00a1Perfecto!':'')+'</strong><br><span style="font-size:.84rem">'+(pf?'Dominio total.':'Revis\u00e1 las incorrectas.')+'</span></div>';}
  return h;}

function rChatSim(sc){
  var cv=lp('cv_'+sc.id);
  if(!cv.msgs)cv={msgs:[],stage:0,scores:[],done:false};
  var stg=sc.stages[cv.stage]||sc.stages[sc.stages.length-1];

  // Build initial client message if first stage and no msgs yet
  if(cv.msgs.length===0&&stg.clientMsg){cv.msgs=[{from:'client',text:stg.clientMsg}];lpS('cv_'+sc.id,cv);}

  var h='<button onclick="S.practiceSub=null;render()" style="display:flex;align-items:center;gap:5px;color:var(--ink3);font-size:.84rem;margin-bottom:16px;padding:0;background:none;border:none">\u2190 Volver</button>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><h3 style="font-size:1.1rem">'+sc.t+'</h3><span class="badge badge-blue">'+sc.lvl+'</span></div>';
  h+='<p style="font-size:.85rem;color:var(--ink3);margin-bottom:16px">'+sc.ctx+'</p>';

  // Chat thread
  h+='<div style="background:#fff;border:1px solid var(--line);border-radius:'+(cv.done?'var(--r-lg)':'var(--r-lg) var(--r-lg) 0 0')+';max-height:450px;overflow-y:auto;padding:18px" id="chatThread">';
  cv.msgs.forEach(function(m){
    var isC=m.from==='client';
    h+='<div style="display:flex;gap:10px;margin-bottom:14px;flex-direction:'+(isC?'row':'row-reverse')+'"><div class="chat-av" style="background:'+(isC?'var(--accent-bg)':'var(--green-bg)')+';color:'+(isC?'var(--accent)':'var(--green-tx)')+'">'+(isC?sc.cl[0]:'T')+'</div><div style="max-width:75%;padding:10px 14px;border-radius:12px;font-size:.88rem;line-height:1.6;background:'+(isC?'var(--paper2)':'var(--accent-bg)')+';color:var(--ink2)"><span class="mono" style="font-size:.68rem;color:var(--ink3);display:block;margin-bottom:2px">'+(isC?sc.cl:'Vos')+'</span>'+m.text+'</div></div>';
  });
  // Typing indicator
  if(S.chatTyping){h+='<div style="display:flex;gap:10px;margin-bottom:14px"><div class="chat-av" style="background:var(--accent-bg);color:var(--accent)">'+sc.cl[0]+'</div><div style="padding:10px 14px;border-radius:12px;background:var(--paper2)"><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span></div></div>';}
  h+='</div>';

  // Input bar or analysis
  if(!cv.done&&!S.chatTyping){
    h+='<div class="chat-input-bar"><input type="text" id="chatMsgInput" placeholder="Escrib\u00ed tu mensaje..." onkeydown="if(event.key===\'Enter\')sendChatMsg(\''+sc.id+'\')"><button onclick="sendChatMsg(\''+sc.id+'\')">Enviar</button></div>';
    h+='<p class="mono" style="font-size:.72rem;color:var(--ink3);margin-top:8px;text-align:center">Turno '+(cv.stage+1)+' de '+sc.stages.length+'</p>';
  } else if(cv.done){
    // Full analysis
    h+=renderChatAnalysis(sc,cv);
  }
  // Reset button
  if(cv.done||cv.msgs.length>1){h+='<button onclick="lpS(\'cv_'+sc.id+'\',{msgs:[],stage:0,scores:[],done:false});render()" class="btn btn-ghost btn-sm" style="margin-top:12px">\u21bb Reiniciar conversaci\u00f3n</button>';}
  return h;
}

function renderChatAnalysis(sc,cv){
  var totalPossible=0,totalScore=0;
  sc.stages.forEach(function(stg,i){totalPossible+=stg.must.length+stg.should.length;});
  cv.scores.forEach(function(s){totalScore+=s.hits+s.bonuses;});
  var pct=Math.round((totalScore/Math.max(1,totalPossible))*100);
  var grade=pct>=80?'Excelente':pct>=60?'Bueno':pct>=40?'Aceptable':'Necesita trabajo';
  var gradeBg=pct>=80?'var(--green-bg)':pct>=60?'var(--accent-bg)':pct>=40?'var(--warn-bg)':'var(--red-bg)';
  var gradeTx=pct>=80?'var(--green-tx)':pct>=60?'var(--accent)':pct>=40?'var(--warn-tx)':'var(--red-tx)';

  var h='<div class="fade" style="background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;margin-top:20px">';
  h+='<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px"><div style="width:56px;height:56px;border-radius:50%;background:'+gradeBg+';display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:1.3rem;color:'+gradeTx+'">'+pct+'%</div><div><h3 style="font-size:1.15rem">An\u00e1lisis de la conversaci\u00f3n</h3><p style="font-size:.88rem;color:var(--ink3)">Calificaci\u00f3n: <strong>'+grade+'</strong></p></div></div>';

  cv.scores.forEach(function(s,i){
    h+='<div style="padding:14px 0;border-top:1px solid var(--line)"><p style="font-weight:600;font-size:.88rem;margin-bottom:8px">Turno '+(i+1)+'</p>';
    if(s.hitList.length)s.hitList.forEach(function(k){h+='<div class="fb-row"><div class="fb-icon" style="background:var(--green-bg);color:var(--green-tx)">\u2713</div><span><strong>Acierto:</strong> mencionaste "'+k+'"</span></div>';});
    if(s.missList.length)s.missList.forEach(function(k){h+='<div class="fb-row"><div class="fb-icon" style="background:var(--red-bg);color:var(--red-tx)">\u2717</div><span><strong>Falt\u00f3:</strong> no mencionaste "'+k+'"</span></div>';});
    if(s.bonusList.length)s.bonusList.forEach(function(k){h+='<div class="fb-row"><div class="fb-icon" style="background:var(--accent-bg);color:var(--accent)">+</div><span><strong>Bonus:</strong> incluiste "'+k+'"</span></div>';});
    if(s.errorList.length)s.errorList.forEach(function(k){h+='<div class="fb-row"><div class="fb-icon" style="background:var(--warn-bg);color:var(--warn-tx)">\u26a0</div><span><strong>Error:</strong> usaste "'+k+'" \u2014 debilita tu posici\u00f3n</span></div>';});
    h+='</div>';
  });
  h+='</div>';
  return h;
}

window.analyzeProp=function(scId){
  var ta=document.getElementById('propText');if(!ta||ta.value.length<50){toast('M\u00ednimo 50 caracteres','error');return;}
  var sc=PROP.find(function(s){return s.id===scId;});var text=ta.value,lower=text.toLowerCase();
  lpS('prop_'+scId,{text:text});
  var fk=sc.kw.filter(function(k){return lower.indexOf(k)>-1;}),fb=sc.bad.filter(function(p){return lower.indexOf(p)>-1;});
  var wc=text.trim().split(/\s+/).filter(Boolean).length;
  var score=Math.min(10,Math.round((fk.length/sc.kw.length)*5+Math.max(0,3-fb.length)+(wc>=80&&wc<=300?2:wc>=50?1:0)));
  var sBg=score>=8?'var(--green-bg)':score>=5?'var(--warn-bg)':'var(--red-bg)',sTx=score>=8?'var(--green-tx)':score>=5?'var(--warn-tx)':'var(--red-tx)';
  document.getElementById('propResult').innerHTML='<div class="fade" style="margin-top:20px;background:#fff;border-radius:var(--r);padding:20px;border:1px solid var(--line)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:44px;height:44px;border-radius:50%;background:'+sBg+';display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:1.1rem;color:'+sTx+'">'+score+'</div><div><p style="font-family:Syne,sans-serif;font-weight:700">'+score+'/10</p><p style="font-size:.82rem;color:var(--ink3)">'+(score>=8?'Propuesta fuerte':score>=5?'Aceptable':'Necesita trabajo')+'</p></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><span class="mono" style="font-size:.68rem;color:var(--green-tx)">Keywords ('+fk.length+'/'+sc.kw.length+')</span><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">'+sc.kw.map(function(k){return'<span class="kw-tag '+(fk.indexOf(k)>-1?'kw-hit':'kw-miss')+'">'+k+'</span>';}).join('')+'</div></div><div><span class="mono" style="font-size:.68rem;color:'+(fb.length?'var(--red-tx)':'var(--green-tx)')+'">Frases d\u00e9biles ('+fb.length+')</span><div style="margin-top:6px">'+(fb.length===0?'<p style="font-size:.82rem;color:var(--green-tx)">\u2713 Ninguna</p>':fb.map(function(p){return'<span class="kw-tag kw-bad">\u26a0 "'+p+'"</span>';}).join(''))+'</div></div></div></div>';};

// ═══ MULTI-TURN CHAT ENGINE ═══
window.sendChatMsg=function(scId){
  var input=document.getElementById('chatMsgInput');if(!input||!input.value.trim())return;
  var sc=CHATS.find(function(s){return s.id===scId;});
  var cv=lp('cv_'+scId);if(!cv.msgs)cv={msgs:[],stage:0,scores:[],done:false};
  var stg=sc.stages[cv.stage];
  var text=input.value.trim();var lower=text.toLowerCase();

  // Add user message
  cv.msgs.push({from:'user',text:text});

  // Score this turn
  var hits=stg.must.filter(function(k){return lower.indexOf(k)>-1;});
  var misses=stg.must.filter(function(k){return lower.indexOf(k)===-1;});
  var bonuses=stg.should.filter(function(k){return lower.indexOf(k)>-1;});
  var errors=stg.avoid.filter(function(k){return lower.indexOf(k)>-1;});
  var turnScore=hits.length-errors.length*2;
  cv.scores.push({hits:hits.length,misses:misses.length,bonuses:bonuses.length,errors:errors.length,hitList:hits,missList:misses,bonusList:bonuses,errorList:errors});

  // Pick client response
  var quality=turnScore>=Math.ceil(stg.must.length*0.6)?'good':turnScore>=1?'neutral':'bad';
  var nextStage=cv.stage+1;
  var isLast=nextStage>=sc.stages.length;

  lpS('cv_'+scId,cv);
  S.chatTyping=true;
  render();

  // Simulate typing delay
  setTimeout(function(){
    S.chatTyping=false;
    cv=lp('cv_'+scId);
    // Add client response
    var reply=stg[quality]||stg.neutral;
    cv.msgs.push({from:'client',text:reply});
    cv.stage=nextStage;
    if(isLast)cv.done=true;
    lpS('cv_'+scId,cv);
    render();
  },1200+Math.random()*800);
};
